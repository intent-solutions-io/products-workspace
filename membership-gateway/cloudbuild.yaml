steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/membership-gateway', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/membership-gateway']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'membership-gateway'
      - '--image=gcr.io/$PROJECT_ID/membership-gateway'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-secrets=WHOP_WEBHOOK_SECRET=whop-webhook-secret:latest,GITHUB_TOKEN=github-token-members:latest,WHOP_API_KEY=whop-api-key:latest,SLACK_WEBHOOK_URL=slack-webhook-url:latest'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--concurrency=80'
